<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f5f5f5;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #4caf50; }
    .dot.disconnected { background: #f44336; }
    .dot.reconnecting { background: #ff9800; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .label { color: #333; font-weight: 500; }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }
    .info {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #fff3e0;
      font-size: 12px;
      color: #e65100;
      display: none;
    }
    .info.visible { display: block; }
    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }
    .actions button {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #retryBtn {
      background: #4caf50;
      color: #fff;
      display: none;
    }
    #retryBtn:hover { background: #43a047; }
    #stopBtn {
      background: #f44336;
      color: #fff;
      display: none;
    }
    #stopBtn:hover { background: #e53935; }
  </style>
</head>
<body>
  <h2 id="titleText">dkitle</h2>
  <div class="status">
    <span id="dot" class="dot disconnected"></span>
    <div class="status-text">
      <span id="label" class="label"></span>
      <span id="hint" class="hint"></span>
    </div>
  </div>
  <div id="info" class="info">
    <span id="infoText"></span>
  </div>
  <div class="actions">
    <button id="retryBtn"></button>
    <button id="stopBtn"></button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
